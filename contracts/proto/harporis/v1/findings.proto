syntax = "proto3";

package harporis.v1;

import "harporis/v1/types.proto";

option go_package = "github.com/Harporis/harporis/contracts/gen/go/harporis/v1;harporisv1";

enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  LOW      = 1;
  MEDIUM   = 2;
  HIGH     = 3;
  CRITICAL = 4;
}

// Finding is one secret detection emitted by services/scanner.
// Published to "harporis.findings.<scan_id>" with
// nats.MsgId(sha256(scan_id|chunk_id|rule_id|line_number|byte_offset))
// for effectively-once delivery (FindingsStream has Duplicates: 5min).
//
// Location semantics:
//   - DIFF_WINDOW source chunks: file_path + commit_sha are populated; refs is empty.
//   - BLOB source chunks:        file_path + commit_sha are empty;     refs is populated
//                                (copied verbatim from GitRowChunk.refs).
message Finding {
  string scan_id     = 1;
  string finding_id  = 2;   // UUIDv4 generated by scanner
  string chunk_id    = 3;   // FK to source GitRowChunk.chunk_id
  string rule_id     = 4;   // matches Rule.ID in the active rule pack
  Severity severity  = 5;

  string file_path                    = 10;
  bytes  commit_sha                   = 11;
  repeated CommitFileRef refs         = 12;
  int32  line_number                  = 13;
  int32  line_number_end              = 14;
  int64  byte_offset                  = 15;

  bytes  matched_secret               = 20;
  bytes  matched_line                 = 21;
  double entropy_score                = 22;

  int64  detected_at_ms               = 30;
  string detector_version             = 31;

  // Per-scan subset of writer output formats (copied from
  // ScanRequest.output.formats through getter and scanner). Writer
  // dispatches to matching sinks only; empty = all enabled sinks.
  repeated string output_formats      = 40;

  // Surrounding-context lines harvested by the scanner for triage.
  // Each element is one raw line (without trailing \n) in source order:
  // context_before[0] is the OLDEST line (lowest line number); the LAST
  // entry of context_before is the line immediately before line_number.
  // context_after[0] is the line immediately after line_number_end; the
  // LAST entry is the FARTHEST line included.
  // Both arrays are bounded by chunk edges, so the requested N may be
  // truncated at the start/end of a file.
  // Empty when OutputConfig.context_lines is 0 (the default).
  repeated bytes context_before       = 41;
  repeated bytes context_after        = 42;
}
