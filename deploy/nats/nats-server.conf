# NATS server config for the Harporis dev stack.
#
# Token auth replaces the unauthenticated default that shipped through
# v0.1.0 — closes the "any local process can publish to
# harporis.findings.>" attack surface that made the writer path-traversal
# class of bugs reachable in dev.
#
# Production deployments should swap this for TLS + nkey/JWT credentials
# (wire.DialConfig.CredsFile is already wired). Tokens here are good
# enough for a local Compose stack where the threat model is "stop the
# container next door from poisoning the pipeline."

# Address bindings — same as the inline -m 8222 / default 4222 of v0.1.
port: 4222
http_port: 8222

# JetStream — same storage layout as the inline -js -sd /data of v0.1.
jetstream {
  store_dir: "/data"
}

# Token auth. $NATS_TOKEN is substituted at startup by nats-server; the
# Compose file defaults it to "harporis-dev" so a vanilla `docker compose
# up` Just Works. Operators override with `NATS_TOKEN=<secret> docker
# compose up` to rotate.
authorization {
  token: $NATS_TOKEN
}
