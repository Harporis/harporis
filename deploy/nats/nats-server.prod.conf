# NATS server config for a PRODUCTION Harporis deployment.
#
# Differences vs the dev config (deploy/nats/nats-server.conf):
#
#   1. TLS on the client port. Operator must supply server cert + key.
#   2. JWT/nkey credentials replace the static token. Operator must
#      provision a resolver (memory or NATS account server).
#   3. Monitoring port still open (8222) but bind it behind your
#      orchestrator's NetworkPolicy / firewall — it is NOT auth'd.
#
# Required env vars (supplied via docker-compose.prod.yml):
#   NATS_TLS_CERT     /etc/nats/certs/server-cert.pem
#   NATS_TLS_KEY      /etc/nats/certs/server-key.pem
#   NATS_TLS_CA       /etc/nats/certs/ca.pem            (client mTLS only)
#   NATS_OPERATOR_JWT /etc/nats/auth/operator.jwt        (NSC-managed accounts)
#   NATS_RESOLVER     URL_RESOLVER or MEMORY_RESOLVER body
#
# This file is a starting point — production deployments will typically
# extend it with cluster routes, leafnode connections, monitoring auth,
# and stream-level limits.

port: 4222
http_port: 8222

jetstream {
  store_dir: "/data"
}

tls {
  cert_file: $NATS_TLS_CERT
  key_file:  $NATS_TLS_KEY
  ca_file:   $NATS_TLS_CA       # uncomment for client mTLS enforcement
  verify:    false               # set to true (with ca_file) for mTLS
  timeout:   3
}

# Operator JWT + resolver. NSC-managed accounts isolate harporis from
# anything else sharing this NATS server; rotate by re-pushing accounts
# without restarting nats-server.
operator: $NATS_OPERATOR_JWT
resolver: $NATS_RESOLVER

# In a single-binary setup, `system_account` lets you reach the system
# subjects (e.g. $SYS.REQ.SERVER.PING) without leaking them into the
# harporis account.
# system_account: SYS
