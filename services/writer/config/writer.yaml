# Writer configuration. Values can be overridden via ${VAR:-default} env
# substitution at load time. CLI flags override these in main.go.
# Env var names match scanner/getter (NATS_URL, LOG_LEVEL) so a single
# docker-compose `environment:` block applies to all services.
nats_url: "${NATS_URL:-nats://nats:4222}"
nats_token: "${NATS_TOKEN:-}" # empty = no auth (dev compose injects "harporis-dev")
nats_creds_file: "${NATS_CREDS_FILE:-}" # path to JWT/nkey creds (prod alternative to token)
nats_root_cas: "${NATS_ROOT_CAS:-}"     # path to PEM bundle for TLS (prod)
workers: 0                   # 0 = runtime.NumCPU()
fetch_batch: 16
fetch_max_wait_ms: 5000
ack_wait_seconds: 30
max_deliver: 5
max_ack_pending: 64
output_dir: "${HARPORIS_OUTPUT_DIR:-/var/lib/harporis/findings}"
ndjson_enabled: true        # one .ndjson per scan_id (streaming-friendly, jq input)
sarif_enabled: true         # one .sarif per scan_id (SARIF v2.1.0, IDE/SCM integrations)
parquet_enabled: true       # one .parquet per scan_id (SIEM / data-warehouse / DuckDB ingestion)
mask_secrets: false         # when true, HTML+PDF render secret[:4] + "***" (NDJSON/SARIF/XLSX/Parquet always carry raw secrets)
# Accumulator-sink batching. Each accumulator sink (SARIF/HTML/XLSX/PDF/Parquet)
# coalesces per-finding writes — instead of rewriting the full file on every
# Finding (O(N^2) bytes), it flushes once `flush_batch` new findings are
# pending OR once `flush_interval_ms` has elapsed (whichever fires first).
# NDJSON is streaming and ignores these. Set flush_batch=1 to restore the
# legacy "render-on-every-write" behaviour.
flush_batch: 50             # findings per accumulator-sink flush
flush_interval_ms: 2000     # backstop ticker; 0 = disable
metrics_addr: ":9102"
log_level: "${LOG_LEVEL:-info}"
