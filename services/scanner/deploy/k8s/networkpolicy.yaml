# NetworkPolicy: restrict scanner egress to NATS only.
#
# Apply only if your cluster's CNI supports NetworkPolicy (Calico, Cilium,
# Antrea, etc.). On clusters without a NetworkPolicy controller this is a
# no-op — defense in depth, not a hard guarantee.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: harporis-scanner
  labels:
    app: harporis-scanner
spec:
  podSelector:
    matchLabels:
      app: harporis-scanner
  policyTypes:
    - Egress
    - Ingress
  egress:
    # NATS client port
    - to:
        - podSelector:
            matchLabels:
              app: harporis-nats
      ports:
        - protocol: TCP
          port: 4222
    # Cluster DNS so the scanner can resolve harporis-nats.harporis.svc
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
  ingress:
    # Prometheus scrape on the metrics port
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9101
