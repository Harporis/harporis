apiVersion: apps/v1
kind: Deployment
metadata:
  name: harporis-scanner
  labels:
    app: harporis-scanner
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: harporis-scanner
  template:
    metadata:
      labels:
        app: harporis-scanner
    spec:
      containers:
        - name: scanner
          image: ghcr.io/harporis/scanner:v0.1.0
          env:
            - name: NATS_URL
              value: "nats://harporis-nats.harporis.svc:4222"
            - name: SCANNER_WORKERS
              value: "4"
            - name: LOG_LEVEL
              value: "info"
          ports:
            - name: metrics
              containerPort: 9101
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            periodSeconds: 10
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
