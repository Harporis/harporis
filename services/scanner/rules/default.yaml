- id: aws-access-key-id
  description: AWS Access Key ID (AKIA / ASIA)
  severity: high
  regex: '(?:^|[^A-Z0-9])((?:AKIA|ASIA)[A-Z0-9]{16})(?:[^A-Z0-9]|$)'
  secret_group: 1
  tags: [aws, cloud]
  examples:
    positive: ["AKIAIOSFODNN7EXAMPLE", "aws_access_key=AKIA1234567890ABCDEF"]
    negative: ["AKIAIOSFO", "akiaiosfodnn7example"]

- id: aws-secret-access-key
  description: AWS Secret Access Key (40-char base64-ish with entropy filter)
  severity: critical
  regex: '(?i)(aws[_-]?secret[_-]?(?:access[_-]?)?key)\s*[:=]\s*[''"]?([A-Za-z0-9/+=]{40})[''"]?'
  secret_group: 2
  entropy:
    min: 4.5
    target_group: 2
  tags: [aws, cloud]
  examples:
    positive: ["aws_secret_access_key=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"]
    negative: ["aws_secret_access_key=tooshort", "aws_secret_access_key=AAAAAAAAAAAAAAAAAAAA!!!!!AAAAAAAAAAAAAAA"]

- id: gcp-api-key
  description: Google Cloud API key (AIza...)
  severity: high
  regex: 'AIza[0-9A-Za-z_-]{35}'
  tags: [gcp, cloud]
  examples:
    positive: ["AIzaSyB-1234567890abcdefghijklmnopqrstuvw"]
    negative: ["AIza-short"]

- id: gcp-service-account-private-key
  description: GCP service account private key (PEM block in JSON)
  severity: critical
  regex: '"private_key":\s*"-----BEGIN PRIVATE KEY-----'
  tags: [gcp, cloud]
  examples:
    positive: ['"private_key": "-----BEGIN PRIVATE KEY-----\nMIIE…"']
    negative: ['"private_key_id": "abc123"']

- id: stripe-live-secret-key
  description: Stripe live secret key (sk_live_...)
  severity: critical
  regex: '\bsk_live_[A-Za-z0-9]{24,}\b'
  tags: [stripe, payments]
  examples:
    positive: ["sk_live_51HabcdefghijklmnopqrstuvwxyzAB"]
    negative: ["sk_test_51HabcdefghijklmnopqrstuvwxyzAB", "sk_live_short"]

- id: stripe-test-secret-key
  description: Stripe test secret key (sk_test_...)
  severity: medium
  regex: '\bsk_test_[A-Za-z0-9]{24,}\b'
  tags: [stripe, payments]
  examples:
    positive: ["sk_test_51HabcdefghijklmnopqrstuvwxyzAB"]
    negative: ["sk_test_short", "sk_live_51HabcdefghijklmnopqrstuvwxyzAB"]

- id: slack-bot-token
  description: Slack bot / user token (xoxb / xoxp / xoxa)
  severity: high
  regex: '\bxox[bpars]-[A-Za-z0-9-]{10,}\b'
  tags: [slack]
  examples:
    positive: ["xoxb-1234567890-abcdefghijklmnop"]
    negative: ["xoxb-short", "xox-1234567890-abcdef"]

- id: slack-webhook-url
  description: Slack incoming webhook URL
  severity: high
  regex: 'https://hooks\.slack\.com/services/T[A-Za-z0-9_]+/B[A-Za-z0-9_]+/[A-Za-z0-9]{20,}'
  tags: [slack]
  examples:
    positive: ["https://hooks.slack.com/services/T01234567/B98765432/abcdefghijklmnopqrstuvwx"]
    negative: ["https://hooks.slack.com/services/T01234567"]

- id: github-pat-classic
  description: GitHub classic personal access token (ghp_...)
  severity: critical
  regex: '\bghp_[A-Za-z0-9]{36}\b'
  tags: [github]
  examples:
    positive: ["ghp_abcdefghijklmnopqrstuvwxyz0123456789"]
    negative: ["ghp_short", "ghp_abcdefghijklmnopqrstuvwxyz012345678!"]

- id: github-pat-fine-grained
  description: GitHub fine-grained personal access token (github_pat_...)
  severity: critical
  regex: '\bgithub_pat_[A-Za-z0-9_]{82}\b'
  tags: [github]
  examples:
    positive: ["github_pat_11ABCDEFG0abcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghij"]
    negative: ["github_pat_short"]

- id: github-oauth-token
  description: GitHub OAuth / installation / refresh / server tokens (gho/ghu/ghs/ghr)
  severity: critical
  regex: '\b(?:gho|ghu|ghs|ghr)_[A-Za-z0-9]{36}\b'
  tags: [github]
  examples:
    positive: ["gho_abcdefghijklmnopqrstuvwxyz0123456789", "ghs_abcdefghijklmnopqrstuvwxyz0123456789"]
    negative: ["ghx_abcdefghijklmnopqrstuvwxyz0123456789", "gho_short"]

- id: jwt
  description: JSON Web Token (three base64url segments)
  severity: medium
  regex: '\beyJ[A-Za-z0-9_-]+\.eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\b'
  tags: [jwt]
  examples:
    positive: ["eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4ifQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"]
    negative: ["eyJ.eyJ", "eyJ"]

- id: private-key-pem
  description: Private key in PEM format (RSA / EC / OpenSSH / PGP / DSA / encrypted)
  severity: critical
  regex: '(?s)-----BEGIN (RSA |EC |OPENSSH |PGP |DSA |ENCRYPTED )?PRIVATE KEY-----'
  tags: [pem, key]
  examples:
    positive: ["-----BEGIN RSA PRIVATE KEY-----", "-----BEGIN OPENSSH PRIVATE KEY-----", "-----BEGIN PRIVATE KEY-----"]
    negative: ["-----BEGIN PUBLIC KEY-----", "-----BEGIN CERTIFICATE-----"]

- id: generic-high-entropy-secret
  description: 'Generic high-entropy assignment: token/secret/api_key/password = <20+ char string> (entropy filter applied at detect-time, not validate-time)'
  severity: low
  regex: '(?i)(token|secret|api[_-]?key|password|passwd|pwd)\s*[:=]\s*[''"]?([A-Za-z0-9+/=_-]{20,})[''"]?'
  secret_group: 2
  entropy:
    min: 4.0
    target_group: 2
  tags: [generic]
  examples:
    positive: ["api_key=3xq8Z1nQpvP7tk+aWoH4mc5XyL2jKBVe", "password: 'sP9a7nLpQ2v5Z3wXq8rE6T'"]

- id: openai-api-key
  description: OpenAI API key (sk-... 48+ chars)
  severity: critical
  regex: '\bsk-[A-Za-z0-9]{20}T3BlbkFJ[A-Za-z0-9]{20}\b'
  tags: [openai, ai, llm]
  examples:
    positive: ["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"]
    negative: ["sk-tooshort", "sk-noT3BlbkFJmarker1234567890abcdefghij1234567890"]

- id: openai-project-key
  description: OpenAI project-scoped API key (sk-proj-...)
  severity: critical
  regex: '\bsk-proj-[A-Za-z0-9_-]{40,}\b'
  tags: [openai, ai, llm]
  examples:
    positive: ["sk-proj-abc123def456ghi789jklmnopqrstuvwxyzABCDEF123"]
    negative: ["sk-proj-short"]

- id: anthropic-api-key
  description: Anthropic Claude API key (sk-ant-api03-... range covers current + slight forward drift)
  severity: critical
  regex: '\bsk-ant-api03-[A-Za-z0-9_-]{90,108}\b'
  tags: [anthropic, ai, llm]
  examples:
    positive: ["sk-ant-api03-abcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ_-abcdefghijklmnopqrstuv0123"]
    negative: ["sk-ant-api03-short", "sk-ant-api02-abcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ_-abcdefghijklmnopqrstuv0123"]

- id: sendgrid-api-key
  description: SendGrid API key (SG.<id>.<secret>)
  severity: critical
  regex: '\bSG\.[A-Za-z0-9_-]{22}\.[A-Za-z0-9_-]{43,55}\b'
  tags: [sendgrid, email]
  examples:
    positive: ["SG.abcdefghijklmnopqrstuv.abcdefghijklmnopqrstuvwxyz0123456789-_ABCDEF"]
    negative: ["SG.short.key", "SG..key"]

- id: twilio-account-sid
  description: Twilio Account SID (AC + 32 hex chars)
  severity: high
  regex: '\bAC[a-f0-9]{32}\b'
  tags: [twilio, telephony]
  examples:
    positive: ["AC1234567890abcdef1234567890abcdef"]
    negative: ["ACtoo-short", "BC1234567890abcdef1234567890abcdef"]

- id: twilio-api-key
  description: Twilio API key SID (SK + 32 hex chars)
  severity: high
  regex: '\bSK[a-f0-9]{32}\b'
  tags: [twilio, telephony]
  examples:
    positive: ["SK1234567890abcdef1234567890abcdef"]
    negative: ["SKtoo-short"]

- id: npm-access-token
  description: npm registry access token (npm_<36-char base62>)
  severity: critical
  regex: '\bnpm_[A-Za-z0-9]{36}\b'
  tags: [npm, registry]
  examples:
    positive: ["npm_abcdefghijklmnopqrstuvwxyz0123456789"]
    negative: ["npm_short"]

- id: pypi-upload-token
  description: PyPI upload token (pypi-AgEIcHl... opaque base64url)
  severity: critical
  regex: '\bpypi-AgEIcHlwaS5vcmcC[A-Za-z0-9_-]{50,}\b'
  tags: [pypi, registry]
  examples:
    positive: ["pypi-AgEIcHlwaS5vcmcCabcdefghijklmnopqrstuvwxyz0123456789-_ABCDEFGHIJKLMNOP"]
    negative: ["pypi-short", "pypi-AgEIcHlwaS5vcmcCshort"]

- id: cloudflare-api-token
  description: Cloudflare API token (CF_API_TOKEN, 40 chars URL-safe)
  severity: high
  regex: '(?i)(cf[_-]?api[_-]?token|cloudflare[_-]?api[_-]?token)\s*[:=]\s*[''"]?([A-Za-z0-9_-]{40})[''"]?'
  secret_group: 2
  entropy:
    min: 4.5
    target_group: 2
  tags: [cloudflare]
  examples:
    positive: ["CF_API_TOKEN=v10-3xQ7zN8KpL4mWj9Bv2Yr5cT6dF1aE0qXwUiOpAsD"]
    negative: ["CF_API_TOKEN=tooshort", "FOO_TOKEN=v10-3xQ7zN8KpL4mWj9Bv2Yr5cT6dF1aE0qXwUiOpAsD"]

- id: discord-bot-token
  description: Discord bot token (3 base64url segments separated by '.')
  severity: critical
  regex: '\b[MN][A-Za-z0-9]{23}\.[A-Za-z0-9_-]{6}\.[A-Za-z0-9_-]{27,}\b'
  tags: [discord, bot]
  examples:
    positive: ["MTIzNDU2Nzg5MDEyMzQ1Njc4.AbCdEf.aBcDeFgHiJkLmNoPqRsTuVwXyZ0123"]
    negative: ["NTIzNDU2Nzg5MDEyMzQ1Njc4.short.bla"]

- id: heroku-api-key
  description: Heroku API key (UUID v4 in HEROKU_API_KEY or assignment)
  severity: high
  regex: '(?i)heroku[_-]?api[_-]?key\s*[:=]\s*[''"]?([a-f0-9]{8}-[a-f0-9]{4}-4[a-f0-9]{3}-[89ab][a-f0-9]{3}-[a-f0-9]{12})[''"]?'
  secret_group: 1
  tags: [heroku]
  examples:
    positive: ["HEROKU_API_KEY=12345678-1234-4567-8901-123456789012"]
    negative: ["HEROKU_API_KEY=not-a-uuid"]

- id: square-access-token
  description: Square access token (EAAA + 60 chars)
  severity: critical
  regex: '\bEAAA[A-Za-z0-9_-]{60}\b'
  tags: [square, payments]
  examples:
    positive: ["EAAAabcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWX"]
    negative: ["EAAAshort"]

- id: telegram-bot-token
  description: Telegram bot token (<digits>:<35-char base64url>)
  severity: high
  regex: '\b[0-9]{8,11}:[A-Za-z0-9_-]{35}\b'
  tags: [telegram, bot]
  examples:
    positive: ["123456789:AAFmkLqIuYzXcVbNm0987654321qwertyui"]
    negative: ["123:short", "1234567:AAFmkLqIuYzXcVbNm0987654321qwertyui"]

- id: mailgun-api-key
  description: Mailgun API key (key-<32-hex>)
  severity: high
  regex: '\bkey-[a-f0-9]{32}\b'
  tags: [mailgun, email]
  examples:
    positive: ["key-abcdef1234567890abcdef1234567890"]
    negative: ["key-short"]
