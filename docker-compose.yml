# Local dev stack: NATS (JetStream) + Harporis getter, both in containers.
# The CLI runs on the host and talks to NATS at localhost:4222.
#
# Bring up:    docker compose up --build -d
# Tear down:   docker compose down -v
#
# Scan a host repo with the CLI:
#   1) Add a volume by creating docker-compose.override.yml (gitignored):
#
#        services:
#          getter:
#            volumes:
#              - /path/to/your/repo:/repos/myrepo:ro
#
#   2) `docker compose up -d --no-deps getter`  (re-creates only getter)
#   3) `harporis scan --local /repos/myrepo`
#      (path is what the getter sees inside the container, NOT the host path).

services:
  nats:
    image: nats:2.10-alpine
    container_name: harporis-nats
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring + /healthz
    volumes:
      - nats-data:/data
    healthcheck:
      # The default nats image is scratch-based (no shell, no wget). The
      # -alpine variant has wget; the /healthz endpoint is the canonical
      # JetStream-aware health probe.
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz | grep -q '\"status\":\"ok\"'"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  getter:
    build:
      context: .
      dockerfile: services/getter/Dockerfile
    image: harporis/getter:dev
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
      LOG_LEVEL: info
      WORK_DIR: /var/lib/harporis/scans
    expose:
      - "9100"
      - "50051"
    tmpfs:
      - /var/lib/harporis/scans
    deploy:
      replicas: 1
    restart: unless-stopped

  scanner:
    build:
      context: .
      dockerfile: services/scanner/Dockerfile
    image: harporis/scanner:dev
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
      LOG_LEVEL: info
    expose:
      - "9101"
    deploy:
      replicas: 1
    restart: unless-stopped

volumes:
  nats-data:
